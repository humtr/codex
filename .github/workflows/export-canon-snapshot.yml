name: Canonicalization Snapshot

on:
  push:
    branches:
      - canon/wrapper-canonicalization
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: canon-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    name: Export canonicalization snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Capture git status
        run: |
          mkdir -p dist
          {
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo
            git status --short
            echo
            git log --oneline --decorate -10
          } > dist/git-status.txt

      - name: Run canonical audit
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set +e
          python3 -B -m tools.codex_termux.cli canon-audit --root . > dist/canon-audit.json 2> dist/canon-audit.stderr
          printf '%s\n' "$?" > dist/canon-audit.exit
          set -e

      - name: Run full wrapper tests as diagnostic log
        env:
          TMPDIR: /tmp
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set +e
          mkdir -p dist/test-logs
          CODEX_TERMUX_TEST_LOG_DIR="$PWD/dist/test-logs" \
          CODEX_TERMUX_TEST_STATUS_FILE="$PWD/dist/tests-run-all.status" \
          CODEX_TERMUX_TEST_RERUN_FAILED_XTRACE=1 \
            bash tests/run-all.sh > dist/tests-run-all.log 2>&1
          printf '%s\n' "$?" > dist/tests-run-all.exit
          set -e

      - name: Create repository snapshot
        run: |
          git archive --format=zip --output=dist/codex-canon-snapshot.zip HEAD

      - name: Write summary
        run: |
          {
            echo "# Canonicalization Snapshot"
            echo
            echo "- ref: ${GITHUB_REF}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- canon-audit exit: $(cat dist/canon-audit.exit 2>/dev/null || echo unknown)"
            echo "- tests/run-all exit: $(cat dist/tests-run-all.exit 2>/dev/null || echo unknown)"
            echo
            if [ -s dist/tests-run-all.status ]; then
              echo "## Test status"
              echo
              echo '```text'
              cat dist/tests-run-all.status
              echo '```'
            fi
          } > dist/summary.md
          cat dist/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-canon-snapshot
          path: dist/
          if-no-files-found: error
          retention-days: 3

      - name: Publish latest snapshot index
        env:
          SNAPSHOT_INDEX_BRANCH: automation/canon-snapshot-index
          SNAPSHOT_INDEX_PATH: snapshots/canon-wrapper-canonicalization/latest.json
        run: |
          set -euo pipefail
          index_tmp="$RUNNER_TEMP/canon-snapshot-latest.json"
          mkdir -p "$(dirname "$index_tmp")"
          cat > "$index_tmp" <<JSON
          {
            "repository": "${GITHUB_REPOSITORY}",
            "source_ref": "${GITHUB_REF}",
            "source_branch": "${GITHUB_REF_NAME}",
            "head_sha": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": ${GITHUB_RUN_ID},
            "run_attempt": ${GITHUB_RUN_ATTEMPT},
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "artifact_name": "codex-canon-snapshot",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$SNAPSHOT_INDEX_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$SNAPSHOT_INDEX_BRANCH"; then
            git switch --detach "origin/$SNAPSHOT_INDEX_BRANCH"
          else
            git switch --orphan "$SNAPSHOT_INDEX_BRANCH"
          fi
          git rm -rf . >/dev/null 2>&1 || true
          mkdir -p "$(dirname "$SNAPSHOT_INDEX_PATH")"
          cp "$index_tmp" "$SNAPSHOT_INDEX_PATH"
          git add "$SNAPSHOT_INDEX_PATH"
          git commit -m "Update canonicalization snapshot index [skip ci]" || exit 0
          git push origin "HEAD:$SNAPSHOT_INDEX_BRANCH"
