name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wrapper-portable-gates:
    name: Portable wrapper gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax checks
        run: |
          bash -n install.sh
          bash -n bin/install-local.sh
          bash -n bin/install-runtime.sh
          bash -n lib/codex-termux.sh
          bash -n tools/rg-termux-shim.sh
          bash -n tools/smoke-termux-wrapper.sh
          bash -n tools/package-release.sh
          bash -n tests/*.sh

      - name: Python syntax checks
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python3 -B -m compileall -q tools

      - name: Run Ubuntu-portable tests
        env:
          TMPDIR: /tmp
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          for test_script in \
            tests/invariants.sh \
            tests/runtime-build.sh \
            tests/package-safety.sh \
            tests/wrapper-archive-safety.sh \
            tests/release-package.sh \
            tests/install-dispatch.sh \
            tests/doctor.sh \
            tests/cli-surface.sh
          do
            echo "== ${test_script##*/} =="
            bash "$test_script"
          done

      - name: Build release package dry-run
        env:
          TMPDIR: /tmp
        run: |
          out="$(bash tools/package-release.sh /tmp/codex-termux-release.zip)"
          test "$out" = /tmp/codex-termux-release.zip
          python3 - <<'PYTHON'
import zipfile
from pathlib import PurePosixPath

zip_path = "/tmp/codex-termux-release.zip"
forbidden_roots = {"tests", ".github", "docs", ".agents", ".git"}
forbidden_exact = {".gitignore", "tools/install-git-hooks.sh", "tools/update-wrapper-version.sh"}
required = {
    "README.md",
    "install.sh",
    "bin/install-local.sh",
    "bin/install-runtime.sh",
    "lib/codex-termux.sh",
    "tools/build-runtime.py",
    "tools/bwrap-termux-compat.py",
    "tools/rg-termux-shim.sh",
    "tools/codex-launcher.c",
    "tools/codex-turn-notify.sh",
    "config/wrapper-version.env",
}
with zipfile.ZipFile(zip_path) as zf:
    stripped = set()
    for name in zf.namelist():
        parts = PurePosixPath(name).parts
        if parts and parts[0].startswith("codex-termux-"):
            rel = PurePosixPath(*parts[1:]) if len(parts) > 1 else PurePosixPath("")
            stripped.add(str(rel))
        else:
            stripped.add(name)
    missing = sorted(required - stripped)
    if missing:
        raise SystemExit(f"missing release entries: {missing}")
    for rel in stripped:
        if not rel:
            continue
        first = rel.split("/", 1)[0]
        if first in forbidden_roots or rel in forbidden_exact:
            raise SystemExit(f"forbidden release entry: {rel}")
PYTHON
