name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wrapper-portable-gates:
    name: Portable wrapper gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax checks
        shell: bash
        run: |
          set -euo pipefail
          bash -n install.sh
          bash -n bin/install-local.sh
          bash -n bin/install-runtime.sh
          bash -n lib/codex-termux.sh
          bash -n tools/rg-termux-shim.sh
          bash -n tools/smoke-termux-wrapper.sh
          bash -n tools/package-release.sh
          bash -n tests/*.sh

      - name: Python syntax checks
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          python3 -B -c 'import ast, pathlib; [ast.parse(path.read_text(encoding="utf-8"), filename=str(path)) for path in pathlib.Path("tools").rglob("*.py")]; print("python syntax: ok")'

      - name: Run portable test subset
        shell: bash
        env:
          TMPDIR: /tmp
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          portable_tests=(
            tests/invariants.sh
            tests/runtime-build.sh
            tests/release-package.sh
            tests/install-dispatch.sh
            tests/doctor.sh
            tests/cli-surface.sh
          )
          for test_script in "${portable_tests[@]}"; do
            echo "== ${test_script##*/} =="
            if command -v timeout >/dev/null 2>&1; then
              timeout -k 5s 120s bash "$test_script"
            else
              bash "$test_script"
            fi
          done
