name: merge-readiness

on:
  pull_request:
  push:
    branches:
      - main
      - 'refactor/**'
      - 'ops/**'
  workflow_dispatch:

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      CODEX_TERMUX_TEST_TIMEOUT_SECONDS: "30"
      CODEX_TERMUX_TARBALL_VALIDATOR_TIMEOUT_SECONDS: "10"
      CODEX_TERMUX_TEST_RERUN_FAILED_XTRACE: "1"
      CODEX_MERGE_READINESS_MODE: full
      CODEX_MERGE_READINESS_WORKFLOW_SHA: ${{ github.sha }}
      CODEX_MERGE_READINESS_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
      CODEX_MERGE_READINESS_ARTIFACT_SHA_KIND: workflow_sha
      CODEX_MERGE_READINESS_ARTIFACT_NAME: codex-agent-handoff-workflow-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run merge readiness loop
        continue-on-error: true
        shell: bash
        run: |
          timeout -k 15s 8m bash -lc 'CODEX_MERGE_READINESS_OUT_DIR="$PWD/out/merge-readiness" bash tools/merge-readiness.sh'
      - name: Upload recursive handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CODEX_MERGE_READINESS_ARTIFACT_NAME }}
          path: |
            out/merge-readiness/**
            merge_readiness_report.json
          if-no-files-found: warn
      - name: Enforce merge readiness
        run: |
          python3 - <<'PY'
          import json, sys
          data=json.load(open('merge_readiness_report.json', encoding='utf-8'))
          if data.get('mode')!='full' or data.get('merge_readiness')!='ready':
              print(json.dumps(data, indent=2, sort_keys=True))
              sys.exit(1)
          PY
